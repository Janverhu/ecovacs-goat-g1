name: Release

# Publishes a stable GitHub release when main is updated to a stable version.
# The version comes from manifest.json. A pre-release version (e.g. 0.2.0b1)
# on main is ignored, so merging develop into main does not accidentally cut a
# stable release - bump the manifest to a stable version (e.g. 0.2.0) to release.
# Development betas are handled separately by develop-prerelease.yml.

on:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: main-release
  cancel-in-progress: false

jobs:
  release:
    name: Publish stable release
    permissions:
      contents: write
    runs-on: ubuntu-latest
    env:
      # Run JavaScript actions on Node.js 24 (Node 20 is being deprecated).
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Read manifest version
        id: ver
        run: |
          version="$(python -c "import json; print(json.load(open('custom_components/ecovacs_goat_g1/manifest.json'))['version'])")"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          if printf '%s' "$version" | grep -Eiq '(a|b|rc|dev)'; then
            echo "stable=false" >> "$GITHUB_OUTPUT"
            echo "Manifest version ${version} is a pre-release; skipping stable release."
          else
            echo "stable=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Check whether this version is already released
        id: tag
        if: steps.ver.outputs.stable == 'true'
        run: |
          git fetch --tags --force
          if git rev-parse "refs/tags/${{ steps.ver.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Tag ${{ steps.ver.outputs.version }} already exists; nothing to publish."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish stable release ${{ steps.ver.outputs.version }}
        if: steps.ver.outputs.stable == 'true' && steps.tag.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.version }}
          target_commitish: ${{ github.sha }}
          prerelease: false
          generate_release_notes: true
