name: Develop pre-release

# Every push to develop publishes an incrementing beta pre-release
# (e.g. 0.2.0b1, 0.2.0b2, ...) so testers can install the latest development
# build straight from HACS via "Show beta versions" - no manual tagging and no
# branch switching required. After each publish, older pre-releases are removed
# so only the latest beta remains visible in HACS.
#
# The beta line auto-advances: when the manifest's base version has already
# shipped as a stable release, the next minor is used instead (e.g. once 0.3.0
# is released, the next beta becomes 0.4.0b1, never 0.3.0b5). When the line
# advances, the new version is written back into manifest.json on develop so the
# stable promote flow in release.yml stays in sync. Stable releases are handled
# separately by release.yml.

on:
  push:
    branches: [develop]

permissions:
  contents: write

concurrency:
  group: develop-prerelease
  cancel-in-progress: true

jobs:
  prerelease:
    name: Publish develop pre-release
    runs-on: ubuntu-latest
    env:
      # Run JavaScript actions on Node.js 24 (Node 20 is being deprecated).
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Compute next beta version
        id: ver
        run: |
          manifest_base="$(python -c "import json, re; print(re.match(r'(\d+\.\d+\.\d+)', json.load(open('custom_components/ecovacs_goat_g1/manifest.json'))['version']).group(1))")"
          git fetch --tags --force
          # Advance past any base that already shipped as a stable release so a
          # beta never shadows a released version (e.g. once 0.3.0 ships, the
          # next beta line becomes 0.4.0b1 instead of 0.3.0b5).
          base="$manifest_base"
          while git rev-parse "refs/tags/${base}" >/dev/null 2>&1; do
            base="$(python -c "import sys; v=sys.argv[1].split('.'); print(f'{v[0]}.{int(v[1]) + 1}.0')" "$base")"
          done
          last="$(git tag -l "${base}b*" | sed -E 's/.*b//' | grep -E '^[0-9]+$' | sort -n | tail -1)"
          next="$(( ${last:-0} + 1 ))"
          version="${base}b${next}"
          echo "manifest_base=${manifest_base}" >> "$GITHUB_OUTPUT"
          echo "base=${base}" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "Publishing pre-release ${version}"

      - name: Sync develop manifest when the beta line advances
        id: sync
        env:
          VERSION: ${{ steps.ver.outputs.version }}
          BASE: ${{ steps.ver.outputs.base }}
          MANIFEST_BASE: ${{ steps.ver.outputs.manifest_base }}
        run: |
          if [ "$BASE" != "$MANIFEST_BASE" ]; then
            python -c "import json, os; p='custom_components/ecovacs_goat_g1/manifest.json'; d=json.load(open(p)); d['version']=os.environ['VERSION']; f=open(p,'w'); json.dump(d,f,indent=2); f.write('\n'); f.close()"
            if ! git diff --quiet -- custom_components/ecovacs_goat_g1/manifest.json; then
              git config user.name "github-actions[bot]"
              git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
              git add custom_components/ecovacs_goat_g1/manifest.json
              # [skip ci] avoids re-triggering this workflow on the push to develop.
              git commit -m "Start ${VERSION} development line [skip ci]"
              git push origin HEAD:develop
            fi
          fi
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Publish pre-release ${{ steps.ver.outputs.version }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.version }}
          target_commitish: ${{ steps.sync.outputs.sha }}
          prerelease: true
          generate_release_notes: true

      - name: Remove older pre-releases
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          current="${{ steps.ver.outputs.version }}"
          gh release list --limit 200 --json tagName,isPrerelease --jq \
            ".[] | select(.isPrerelease) | .tagName" | while read -r tag; do
            if [[ "$tag" != "$current" ]]; then
              echo "Removing old pre-release ${tag}"
              gh release delete "$tag" --yes --cleanup-tag || true
            fi
          done
