name: Develop pre-release

# Every push to develop publishes an incrementing beta pre-release
# (e.g. 0.2.0b1, 0.2.0b2, ...) so testers can install the latest development
# build straight from HACS via "Show beta versions" - no manual tagging and no
# branch switching required. Stable releases are handled separately/manually.

on:
  push:
    branches: [develop]

permissions:
  contents: write

concurrency:
  group: develop-prerelease
  cancel-in-progress: true

jobs:
  prerelease:
    name: Publish develop pre-release
    runs-on: ubuntu-latest
    env:
      # Run JavaScript actions on Node.js 24 (Node 20 is being deprecated).
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Compute next beta version
        id: ver
        run: |
          base="$(python -c "import json, re; print(re.match(r'(\d+\.\d+\.\d+)', json.load(open('custom_components/ecovacs_goat_g1/manifest.json'))['version']).group(1))")"
          git fetch --tags --force
          last="$(git tag -l "${base}b*" | sed -E 's/.*b//' | grep -E '^[0-9]+$' | sort -n | tail -1)"
          next="$(( ${last:-0} + 1 ))"
          version="${base}b${next}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "Publishing pre-release ${version}"

      - name: Publish pre-release ${{ steps.ver.outputs.version }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.version }}
          target_commitish: ${{ github.sha }}
          prerelease: true
          generate_release_notes: true
